---
- name: Executioner B - True Dynamic Formatter
  hosts: localhost
  gather_facts: false

  tasks:
    - name: 1. Stop if no data
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: 2. Map Excel Data to Standard VM List
      ansible.builtin.set_fact:
        # 这里我们遍历从 Excel 拿到的原始列表 item
        final_vm_list: >-
          {% set vms = [] %}
          {% for item in provision_data.vm_list %}
          {%   set _ = vms.append({
                 'name': item.name,
                 'ip': item.ip,
                 'mask': '255.255.255.0',
                 'gw': '192.168.22.1',
                 'dns': ["192.168.22.70", "8.8.8.8"],
                 'cpu': item.cpu | int,
                 'ram': (item.ram | int) * 1024,
                 'portgroup': item.portgroup,
                 'os_disk': item.os_disk | int,
                 'app_disk': item.app_disk | default('')
               }) 
          %}
          {% endfor %}
          {{ vms }}

    - name: 3. Visual Dashboard - Clean YAML Output
      ansible.builtin.debug:
        msg: 
          - "=========================================================="
          - "   PROVISIONING REQUEST FOR: {{ provision_data.ticket_context.number }}"
          - "=========================================================="
          - "vm_list:"
          # 使用 to_nice_yaml 渲染出整洁的变量列表
          - "{{ {'vm_list': final_vm_list} | to_nice_yaml(indent=2) }}"
          - "=========================================================="

    - name: 4. Final Verification
      ansible.builtin.debug:
        msg: "Ready to provision {{ final_vm_list | length }} VMs using these dynamic variables."
