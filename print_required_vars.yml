---
- name: Executioner B - Full Details Display
  hosts: localhost
  gather_facts: false

  tasks:
    # 增加防护：如果 has_work 不存在或为 false，则跳过
    - name: Check if there is data to process
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: Display Full Provisioning Requirements
      ansible.builtin.debug:
        msg: 
          - "=========================================="
          - "   FULL PROVISIONING DASHBOARD            "
          - "=========================================="
          - "SOURCE TICKET : {{ provision_data.ticket_context.number }}"
          - "------------------------------------------"
          - "EXTRACTED DATA FROM EXCEL:"
          - "{{ provision_data.all_specs | dict2items | map('attribute', 'key') | zip(provision_data.all_specs.values()) | list }}"
          - "=========================================="

    - name: Summary Table (Key Specs)
      ansible.builtin.debug:
        msg: "Target: {{ provision_data.all_specs.server_description }} | OS: {{ provision_data.all_specs.os_version }} | CPU: {{ provision_data.all_specs.cpu_cores }}"
