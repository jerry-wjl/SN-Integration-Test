---
- name: Executioner B - Template Based Formatter
  hosts: localhost
  gather_facts: false

  tasks:
    - name: 1. Stop if no work
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: 2. Create standard list in memory
      ansible.builtin.set_fact:
        final_vm_list: >-
          {% set vms = [] %}
          {% for item in provision_data.vm_list %}
          {%   set _ = vms.append({
                 'name': item.name,
                 'ip': item.ip,
                 'mask': '255.255.255.0',
                 'gw': '192.168.22.1',
                 'dns': ["192.168.22.70", "8.8.8.8"],
                 'cpu': item.cpu | int,
                 'ram': (item.ram | int) * 1024,
                 'portgroup': item.portgroup,
                 'os_disk': item.os_disk | int,
                 'app_disk': item.app_disk | default('')
               }) 
          %}
          {% endfor %}
          {{ vms }}

    - name: 3. Render Final Config via Template
      # template 模块是处理 YAML 格式化最专业、最不会出错的方式
      ansible.builtin.template:
        src: poc_config.j2
        dest: "{{ playbook_dir }}/generated_poc_config.yml"

    - name: 4. Export the file path for B1
      ansible.builtin.set_stats:
        data:
          runtime_config_file: "{{ playbook_dir }}/generated_poc_config.yml"

    - name: 5. Final Verification (Pure Text)
      ansible.builtin.command: "cat {{ playbook_dir }}/generated_poc_config.yml"
      register: final_config_text

    - name: 6. Show it
      ansible.builtin.debug:
        var: final_config_text.stdout_lines
