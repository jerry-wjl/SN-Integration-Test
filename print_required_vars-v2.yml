---
- name: Executioner B - Structured Variable Formatter & Verification
  hosts: localhost
  gather_facts: false

  tasks:
    - name: 1. Stop if no work to process
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: 2. Re-structure vm_list to match poc_config format
      ansible.builtin.set_fact:
        # 动态映射：从 Excel 解析的内容填入 vm_list 结构
        final_vm_list: >-
          {% set vms = [] %}
          {% for item in provision_data.vm_list %}
          {%   set _ = vms.append({
                 'name': item.name,
                 'ip': item.ip,
                 'mask': '255.255.255.0',
                 'gw': '192.168.22.1',
                 'dns': ["192.168.22.70", "8.8.8.8"],
                 'cpu': item.cpu | int,
                 'ram': (item.ram | int) * 1024,
                 'portgroup': item.portgroup,
                 'os_disk': item.os_disk | int,
                 'app_disk': item.app_disk | default('')
               }) 
          %}
          {% endfor %}
          {{ vms }}

    - name: 3. Create the New poc_config.yml in /tmp
      ansible.builtin.copy:
        dest: "/tmp/poc_config.yml"
        content: |
          ---
          # 1. 基础架构连接信息
          infra_config:
            vcenter_dc: "SDDC-Datacenter"
            vcenter_cluster: "Cluster-1"
            vcenter_ds: "workload_share_yBaQN"
            vm_folder: "/Workloads/sandbox-n7bs6"
            vm_template: "W2K19-VM-Template"
            vm_network: "segment-sandbox-n7bs6"

          # 2. Windows 运维连接参数
          win_connection_vars:
            ansible_connection: "winrm"
            ansible_port: 5985
            ansible_winrm_transport: "ntlm"
            ansible_winrm_server_cert_validation: "ignore"
            ansible_user: "administrator"
            ansible_password: "Redhat!234"

          # 3. Active Directory 域信息
          ad_domain:
            name: "example.org"
            dns_server: "192.168.22.70"
            admin_user: "administrator@example.org"
            admin_password: "Redhat!234"

          # 4. 待部署虚机列表 (由 ServiceNow 附件动态生成)
          vm_list:
          {{ final_vm_list | to_nice_yaml(indent=2) | indent(2, False) }}

    - name: 4. Handover config path to Workflow
      ansible.builtin.set_stats:
        data:
          runtime_config_file: "/tmp/poc_config.yml"

    - name: 5. Display Generated File Content (For Verification)
      # 使用 slurp 读取文件，因为它能处理 base64 编码，防止特殊字符导致 debug 中断
      ansible.builtin.slurp:
        src: "/tmp/poc_config.yml"
      register: slurped_config

    - name: 6. Show the Final YAML Configuration
      ansible.builtin.debug:
        msg: 
          - "----------------------------------------------------------"
          - "   CONTENT OF GENERATED /tmp/poc_config.yml"
          - "----------------------------------------------------------"
          - "{{ slurped_config.content | b64decode }}"
          - "----------------------------------------------------------"
