---
- name: Executioner B - Direct Template Version
  hosts: localhost
  gather_facts: false

  tasks:
    - name: 1. Stop if no work
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: 2. Render YAML directly from raw data
      # 此时模板会直接访问 Sentinel A 传过来的 provision_data
      ansible.builtin.template:
        src: poc_config.j2
        dest: "./runtime_poc_config.yml"

    - name: 3. Export the path
      ansible.builtin.set_stats:
        data:
          runtime_config_file: "{{ lookup('env', 'PWD') }}/runtime_poc_config.yml"

    - name: 4. Final Text Verification
      ansible.builtin.command: "cat ./runtime_poc_config.yml"
      register: final_config_text

    - name: 5. Show Output
      ansible.builtin.debug:
        msg: "{{ final_config_text.stdout_lines }}"
