---
- name: Executioner B - Solid YAML Formatter
  hosts: localhost
  gather_facts: false

  vars:
    # 使用相对路径，AAP 会在 bubblewrap 隔离区的当前工作目录创建它
    # 这绝对有写权限，且不会干扰 Git 仓库或物理机 /tmp
    output_file: "generated_poc_config.yml"

  tasks:
    - name: 1. Stop if no work
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: 2. Re-structure VM list
      ansible.builtin.set_fact:
        final_vm_list: >-
          {% set vms = [] %}
          {% for item in provision_data.vm_list %}
          {%   set _ = vms.append({
                 'name': item.name,
                 'ip': item.ip,
                 'mask': '255.255.255.0',
                 'gw': '192.168.22.1',
                 'dns': ["192.168.22.70", "8.8.8.8"],
                 'cpu': item.cpu | int,
                 'ram': (item.ram | int) * 1024,
                 'portgroup': item.portgroup,
                 'os_disk': item.os_disk | int,
                 'app_disk': item.app_disk | default('')
               }) 
          %}
          {% endfor %}
          {{ vms }}

    - name: 3. Create YAML file using standard blocks
      # 注意：这次我们彻底放弃 set_fact 预转义，直接在 copy 里用 template 语法
      ansible.builtin.copy:
        dest: "{{ output_file }}"
        content: |
          ---
          # 1. 基础架构连接信息
          infra_config:
            vcenter_dc: "SDDC-Datacenter"
            vcenter_cluster: "Cluster-1"
            vcenter_ds: "workload_share_yBaQN"
            vm_folder: "/Workloads/sandbox-n7bs6"
            vm_template: "W2K19-VM-Template"
            vm_network: "segment-sandbox-n7bs6"

          # 2. Windows 运维连接参数
          win_connection_vars:
            ansible_connection: "winrm"
            ansible_port: 5985
            ansible_winrm_transport: "ntlm"
            ansible_winrm_server_cert_validation: "ignore"
            ansible_user: "administrator"
            ansible_password: "Redhat!234"

          # 3. Active Directory 域信息
          ad_domain:
            name: "example.org"
            dns_server: "192.168.22.70"
            admin_user: "administrator@example.org"
            admin_password: "Redhat!234"

          # 4. 待部署虚机列表
          vm_list:
          {{ final_vm_list | to_nice_yaml(indent=2) | indent(2, first=True) }}

    - name: 4. Export full path for next job
      ansible.builtin.set_stats:
        data:
          # 使用 realpath 获取隔离区内的全路径，确保 B1 能找到
          runtime_config_file: "{{ lookup('env', 'PWD') }}/{{ output_file }}"

    - name: 5. Verify Content (The only way to be sure)
      ansible.builtin.shell: "cat {{ output_file }}"
      register: cat_out

    - name: 6. Final Dashboard Output
      ansible.builtin.debug:
        msg: "{{ cat_out.stdout_lines }}"
