---
- name: Executioner B - Batch Display
  hosts: localhost
  gather_facts: false

  tasks:
    - name: End if no work
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: Display Dashboard Header
      ansible.builtin.debug:
        msg: 
          - "=========================================="
          - "  PROVISIONING JOB FOR TICKET: {{ provision_data.ticket_context.number }}"
          - "  VMS TO BE CREATED: {{ provision_data.vm_list | length }}"
          - "=========================================="

    - name: Display Each VM Specifications
      ansible.builtin.debug:
        msg: 
          - "------------------------------------------"
          - "VM NAME    : {{ item.name }}"
          - "IP ADDRESS : {{ item.ip }}"
          - "CPU CORES  : {{ item.cpu }}"
          - "RAM (GB)   : {{ item.ram }}"
          - "PORT GROUP : {{ item.portgroup }}"
          - "CLUSTER    : {{ item.cluster }}"
          - "OS DISK    : {{ item.os_disk }} GB"
          - "APP DISK   : {{ item.app_disk | default('N/A') }} GB"
      loop: "{{ provision_data.vm_list }}"
