---
- name: Executioner B - Bulk Display and Verification
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check data availability
      ansible.builtin.meta: end_play
      when: not (has_work | default(false) | bool)

    - name: Display Ticket Header
      ansible.builtin.debug:
        msg: 
          - "=========================================="
          - "PROCESSING TICKET: {{ provision_data.ticket_context.number }}"
          - "TOTAL VMS DETECTED: {{ provision_data.vm_list | length }}"
          - "=========================================="

    - name: Summary of Batch Request
      ansible.builtin.debug:
        msg: >
          VM: {{ item.name }} 
          | IP: {{ item.ip }} 
          | CPU: {{ item.cpu }} 
          | RAM: {{ item.ram }}GB 
          | PG: {{ item.portgroup }}
      loop: "{{ provision_data.vm_list }}"

    - name: Specific Disk Analysis
      ansible.builtin.debug:
        msg: "VM {{ item.name }} requires OS: {{ item.os_disk }}GB, App: {{ item.app_disk | default('None') }}GB"
      loop: "{{ provision_data.vm_list }}"
      when: item.app_disk != ""
