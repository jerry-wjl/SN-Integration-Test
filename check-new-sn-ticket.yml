---
- name: Sentinel A - Debug Mode (With Pause and State Tracking)
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: 1. Search for NEW Provisioning Ticket
      servicenow.itsm.incident_info:
        # 仅匹配状态为 New (1) 的工单
        sysparm_query: "short_descriptionLIKEVM Provision^state=1"
      register: incident_result

    - name: End play if no tickets found
      ansible.builtin.meta: end_play
      when: incident_result.records | length == 0

    - name: 2. Change State to Active (Numeric 2)
      servicenow.itsm.incident:
        number: "{{ incident_result.records[0].number }}"
        state: 2  # 对应你看到的 Active
        other:
          assigned_to: "{{ lookup('env', 'SN_USERNAME') }}"
          work_notes: "Ansible AAP captured the ticket. Transitioning from New to Active."

    - name: 3. Verify Current State in AAP (Pre-Pause)
      servicenow.itsm.incident_info:
        sysparm_query: "number={{ incident_result.records[0].number }}"
      register: state_check_pre

    - name: Show Current State
      ansible.builtin.debug:
        msg: "The ticket state is now: {{ state_check_pre.records[0].state }} (Display: Active)"

    - name: 4. Download and Parse Excel (Background Work)
      # 这里包含之前的下载和 Python 解析逻辑（略，见下文完整代码）
      # ... 

    # --- 你的要求：增加暂停时间 ---
    - name: 5. PAUSE FOR 30 SECONDS (Wait for UI Sync)
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting 30 seconds... Please check ServiceNow UI for 'Active' status."

    - name: 6. Parse Excel (Final variables)
      ansible.builtin.shell: |
        python3 << EOF
        import pandas as pd
        import json
        import re
        try:
            df = pd.read_excel('/tmp/Provision_Request_Form_v1.xlsx', header=None)
            def extract(key, is_num=False):
                mask = df.apply(lambda row: row.astype(str).str.contains(key, case=False, regex=False, na=False).any(), axis=1)
                if not df[mask].empty:
                    vals = df[mask].iloc[0].dropna().values
                    if len(vals) > 1:
                        raw = str(vals[-1]).strip()
                        if is_num:
                            match = re.search(r'(\d+)', raw)
                            return int(match.group(1)) if match else 0
                        return raw
                return 0 if is_num else ""
            
            structured_data = {
                "ticket_context": {"number": "{{ incident_result.records[0].number }}", "sys_id": "{{ incident_result.records[0].sys_id }}"},
                "server_info": {"hostname": extract("Server Description"), "os": extract("OS Version")},
                "vm_specs": {"cpu": extract("#CPU Cores", is_num=True), "ram_gb": extract("Memory", is_num=True)},
                "storage": {"total_gb": extract("Total Disk Size", is_num=True)}
            }
            print(json.dumps(structured_data))
        except Exception as e:
            print(json.dumps({"error": str(e)}))
        EOF
      register: python_out

    - name: 7. Final Update and Set Stats
      ansible.builtin.set_stats:
        data:
          provision_data: "{{ python_out.stdout | from_json }}"
      
    - name: 8. Update Ticket Notes with Result
      servicenow.itsm.incident:
        sys_id: "{{ incident_result.records[0].sys_id }}"
        other:
          work_notes: "Parsing complete. Data: {{ python_out.stdout }}"
