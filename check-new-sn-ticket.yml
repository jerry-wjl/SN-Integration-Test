---
- name: Sentinel A - Final Data Extraction with Ticket Context
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: 1. Search for VM Provisioning Ticket
      servicenow.itsm.incident_info:
        sysparm_query: "short_descriptionLIKEVM Provision^state=1" # 仅查找新建状态的工单
      register: incident_result

    - name: End play if no tickets found
      ansible.builtin.meta: end_play
      when: incident_result.records | length == 0

    - name: 2. Acknowledge and Set State to In Progress
      servicenow.itsm.incident:
        number: "{{ incident_result.records[0].number }}"
        state: 2  # 强制设为 2 (In Progress)
        other:
          assigned_to: "{{ lookup('env', 'SN_USERNAME') }}"
          work_notes: "Ansible AAP has captured this ticket. Incident Number and Sys_ID are now being tracked."

    - name: 3. Get attachment sys_id
      ansible.builtin.uri:
        url: "{{ lookup('env', 'SN_HOST') }}/api/now/table/sys_attachment?sysparm_query=table_sys_id={{ incident_result.records[0].sys_id }}"
        method: GET
        user: "{{ lookup('env', 'SN_USERNAME') }}"
        password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
      register: api_attach_info

    - name: 4. Download Excel to /tmp
      servicenow.itsm.attachment_info:
        instance:
          host: "{{ lookup('env', 'SN_HOST') }}"
          username: "{{ lookup('env', 'SN_USERNAME') }}"
          password: "{{ lookup('env', 'SN_PASSWORD') }}"
        sys_id: "{{ item.sys_id }}"
        dest: "/tmp/Provision_Request_Form_v1.xlsx"
      loop: "{{ api_attach_info.json.result | default([]) }}"
      when: item.file_name == "Provision_Request_Form_v1.xlsx"

    - name: 5. Parse into Structured Object (Including Ticket Info)
      ansible.builtin.shell: |
        python3 << EOF
        import pandas as pd
        import json
        import re

        try:
            df = pd.read_excel('/tmp/Provision_Request_Form_v1.xlsx', header=None)
            
            def extract(key, is_num=False):
                mask = df.apply(lambda row: row.astype(str).str.contains(key, case=False, regex=False, na=False).any(), axis=1)
                if not df[mask].empty:
                    vals = df[mask].iloc[0].dropna().values
                    if len(vals) > 1:
                        raw = str(vals[-1]).strip()
                        if is_num:
                            match = re.search(r'(\d+)', raw)
                            return int(match.group(1)) if match else 0
                        return raw
                return 0 if is_num else ""

            # 组织最终的数据结构
            structured_data = {
                "ticket_context": {
                    "number": "{{ incident_result.records[0].number }}",
                    "sys_id": "{{ incident_result.records[0].sys_id }}"
                },
                "server_info": {
                    "hostname": extract("Server Description"),
                    "app_type": extract("Application Type"),
                    "platform": extract("Platform"),
                    "property": extract("Server Property"),
                    "os": extract("OS Version")
                },
                "vm_specs": {
                    "cpu": extract("#CPU Cores", is_num=True),
                    "ram_gb": extract("Memory", is_num=True)
                },
                "storage": {
                    "os_disk_gb": 80,
                    "data_disk_gb": extract("App Disk", is_num=True),
                    "db_data_gb": extract("DB Data Disk", is_num=True),
                    "db_log_gb": extract("DB Log Disk", is_num=True),
                    "total_gb": extract("Total Disk Size", is_num=True)
                },
                "db_config": {
                    "version": extract("DB Version"),
                    "tde_enabled": extract("Enable TDE"),
                    "ha_protection": extract("HA Protection")
                }
            }
            print(json.dumps(structured_data))
        except Exception as e:
            print(json.dumps({"error": str(e)}))
        EOF
      register: python_out

    - name: 6. Set stats for Executioner B
      ansible.builtin.set_stats:
        data:
          provision_data: "{{ python_out.stdout | from_json }}"
          has_work: true

    - name: 7. Update Ticket with Extraction Report
      servicenow.itsm.incident:
        sys_id: "{{ incident_result.records[0].sys_id }}"
        other:
          work_notes: |
            [AUTOMATION] Extraction completed for {{ incident_result.records[0].number }}.
            Parsed Specs: {{ (python_out.stdout | from_json).vm_specs.cpu }} CPU, {{ (python_out.stdout | from_json).vm_specs.ram_gb }}GB RAM.
            Workflow will now proceed to infrastructure provisioning.
