---
- name: Sentinel A - Find and Download Provisioning Request
  hosts: localhost
  gather_facts: false

  tasks:
    # 1. 查找工单 (这里还是用 incident_info，因为它之前是成功的)
    - name: Retrieve New VM Provisioning incidents
      servicenow.itsm.incident_info:
        sysparm_query: "state=1^short_descriptionLIKEVM Provision"
      register: incident_result

    # 2. 没活干优雅退出
    - name: End play if no new tickets found
      ansible.builtin.meta: end_play
      when: incident_result.records | length == 0

    # 3. 接单 (Acknowledge)
    - name: Acknowledge the ticket
      servicenow.itsm.incident:
        state: in_progress
        number: "{{ incident_result.records[0].number }}"
        other:
          assigned_to: "{{ lookup('env', 'SN_USERNAME') }}"
      register: updated_incident

    # 4. 【全兼容修复】使用原生 uri 模块直接查询附件表
    - name: Get attachment list via REST API
      ansible.builtin.uri:
        url: "https://{{ lookup('env', 'SN_HOST') }}/api/now/table/sys_attachment?sysparm_query=table_sys_id={{ incident_result.records[0].sys_id }}"
        method: GET
        user: "{{ lookup('env', 'SN_USERNAME') }}"
        password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
        status_code: 200
      register: api_attach_info

    # 5. 【全兼容修复】下载附件
    - name: Download the XLS attachment
      ansible.builtin.get_url:
        url: "https://{{ lookup('env', 'SN_HOST') }}/api/now/attachment/{{ item.sys_id }}/value"
        dest: "/tmp/Provision_Request_Form_v1.xlsx"
        url_username: "{{ lookup('env', 'SN_USERNAME') }}"
        url_password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
      loop: "{{ api_attach_info.json.result }}"
      when: 
        - api_attach_info.json.result | length > 0
        - item.file_name == "Provision_Request_Form_v1.xlsx"

    # 6. 设置变量传递
    - name: Set stats for the next Playbook
      ansible.builtin.set_stats:
        data:
          snow_ticket_number: "{{ incident_result.records[0].number }}"
          local_excel_path: "/tmp/Provision_Request_Form_v1.xlsx"
          has_work: true
