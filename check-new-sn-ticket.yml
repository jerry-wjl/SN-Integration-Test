---
- name: Sentinel A - Recursive Queue Processor
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  vars:
    local_excel_path: "/tmp/Provision_Request_Form_v1.xlsx"
    # --- 递归配置 ---
    # 请在 AAP 界面查看此 Workflow 模板的 ID，并在执行时通过变量或环境变量传入
    # 或者直接在这里硬编码测试（例如：42）
    workflow_template_id: "{{ lookup('env', 'WF_TEMPLATE_ID') | default('1') }}"
    aap_api_url: "{{ lookup('env', 'SN_HOST') | regex_replace('servicenow.com', 'controller.example.com') }}" # 这里的逻辑请按实际 AAP 地址修改

  tasks:
    - name: 1. Poll for ALL New Tickets
      servicenow.itsm.incident_info:
        sysparm_query: "short_descriptionLIKEVM Provision^state=1"
      register: incident_result

    - name: Handle Empty Queue
      ansible.builtin.set_stats:
        data:
          has_work: false
      when: incident_result.records | length == 0

    - name: End Play if No Work
      ansible.builtin.meta: end_play
      when: incident_result.records | length == 0

    # --- 核心逻辑：只锁定列表中的第一个工单进行处理 ---
    - name: 2. Process First Ticket in Queue
      servicenow.itsm.incident:
        number: "{{ incident_result.records[0].number }}"
        state: 2 
        other:
          assigned_to: "{{ lookup('env', 'SN_USERNAME') }}"
          work_notes: "AAP Dispatcher: Processing this ticket. (Remaining in queue: {{ incident_result.records | length - 1 }})"

    - name: 3. Get Attachment metadata
      ansible.builtin.uri:
        url: "{{ lookup('env', 'SN_HOST') }}/api/now/table/sys_attachment?sysparm_query=table_sys_id={{ incident_result.records[0].sys_id }}"
        method: GET
        user: "{{ lookup('env', 'SN_USERNAME') }}"
        password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
      register: api_attach_info

    - name: 4. Download Excel
      servicenow.itsm.attachment_info:
        instance:
          host: "{{ lookup('env', 'SN_HOST') }}"
          username: "{{ lookup('env', 'SN_USERNAME') }}"
          password: "{{ lookup('env', 'SN_PASSWORD') }}"
        sys_id: "{{ api_attach_info.json.result[0].sys_id }}"
        dest: "{{ local_excel_path }}"

    - name: 5. Parse Data via Python
      ansible.builtin.shell: |
        python3 << EOF
        import pandas as pd
        import json
        import re
        import os
        try:
            df = pd.read_excel("{{ local_excel_path }}", header=None)
            def extract(key):
                mask = df.apply(lambda row: row.astype(str).str.contains(key, case=False, na=False).any(), axis=1)
                if not df[mask].empty:
                    vals = df[mask].iloc[0].dropna().values
                    return str(vals[-1]).strip() if len(vals) > 1 else ""
                return "N/A"
            
            keys = ["Server Description", "Application Type", "Platform", "Server Type", "OS Version", "#CPU Cores", "Memory", "Total Disk Size"]
            full_results = { re.sub(r'[^a-zA-Z0-9]', '_', k).lower().strip('_'): extract(k) for k in keys }
            
            output = {
                "ticket_context": {
                    "number": "{{ incident_result.records[0].number }}",
                    "sys_id": "{{ incident_result.records[0].sys_id }}"
                },
                "all_specs": full_results
            }
            print(json.dumps(output))
        except Exception as e:
            print(json.dumps({"error": str(e)}))
        EOF
      register: python_out

    - name: 6. Handover Stats for Executioner B
      ansible.builtin.set_stats:
        data:
          provision_data: "{{ python_out.stdout | from_json }}"
          has_work: true

    # --- 递归触发：如果还有剩余工单，则启动下一次轮询 ---
    - name: 7. RECURSIVE CHECK - Re-trigger myself if queue is not empty
      ansible.builtin.uri:
        # 注意：这里调用的是此 Workflow 自身的 Launch API
        url: "https://{{ lookup('env', 'TOWER_HOST') }}/api/v2/workflow_job_templates/{{ workflow_template_id }}/launch/"
        method: POST
        user: "{{ lookup('env', 'SN_USERNAME') }}" # 或者使用专门的 AAP Token
        password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
        status_code: 201
        body_format: json
        validate_certs: false
      when: incident_result.records | length > 1
      register: retrigger_out

    - name: Log Recursion Info
      ansible.builtin.debug:
        msg: "Retriggered Workflow to handle the next ticket. API Status: {{ retrigger_out.status }}"
      when: incident_result.records | length > 1
