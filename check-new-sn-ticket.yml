---
- name: Sentinel A - Robust Listener with Recursive Trigger
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  vars:
    # --- 基础配置 ---
    local_excel_path: "/tmp/Provision_Request_Form_v1.xlsx"

    # --- 递归配置（请根据你的 Lab 环境手动填写） ---
    # 这里的数字是你当前这个 Workflow 的 ID (在 AAP 地址栏查看)
    my_workflow_id: "填入你的数字ID"
    # 这里的地址是你 AAP 的实际访问地址 (IP 或 域名)
    aap_host: "填入你的AAP地址"

  tasks:
    - name: 1. Poll for NEW VM Provisioning Tickets
      servicenow.itsm.incident_info:
        sysparm_query: "short_descriptionLIKEVM Provision^state=1"
      register: incident_result

    - name: Handle Empty Queue
      ansible.builtin.set_stats:
        data:
          has_work: false
      when: incident_result.records | length == 0

    - name: End Play if No Work
      ansible.builtin.meta: end_play
      when: incident_result.records | length == 0

    - name: 2. Capture and Move to Active
      servicenow.itsm.incident:
        number: "{{ incident_result.records[0].number }}"
        state: 2 
        other:
          assigned_to: "{{ lookup('env', 'SN_USERNAME') }}"
          work_notes: "AAP Workflow: Ticket captured. Remaining in queue: {{ incident_result.records | length - 1 }}"

    - name: 3. Get Attachment metadata
      ansible.builtin.uri:
        url: "{{ lookup('env', 'SN_HOST') }}/api/now/table/sys_attachment?sysparm_query=table_sys_id={{ incident_result.records[0].sys_id }}"
        method: GET
        user: "{{ lookup('env', 'SN_USERNAME') }}"
        password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
      register: api_attach_info

    - name: 4. Download Excel Attachment
      servicenow.itsm.attachment_info:
        instance:
          host: "{{ lookup('env', 'SN_HOST') }}"
          username: "{{ lookup('env', 'SN_USERNAME') }}"
          password: "{{ lookup('env', 'SN_PASSWORD') }}"
        sys_id: "{{ api_attach_info.json.result[0].sys_id }}"
        dest: "{{ local_excel_path }}"

    - name: 5. Verify File Existence
      ansible.builtin.stat:
        path: "{{ local_excel_path }}"
      register: file_check

    - name: Fail if file download failed
      ansible.builtin.fail:
        msg: "The file was not found at {{ local_excel_path }} even after download task!"
      when: not file_check.stat.exists

    - name: 6. Parse Excel via Python
      ansible.builtin.shell: |
        python3 << EOF
        import pandas as pd
        import json
        import re
        import os

        target_file = "{{ local_excel_path }}"
        
        try:
            if not os.path.exists(target_file):
                raise FileNotFoundError(f"Python cannot see the file at {target_file}")

            df = pd.read_excel(target_file, header=None)
            
            def extract(key):
                mask = df.apply(lambda row: row.astype(str).str.contains(key, case=False, na=False).any(), axis=1)
                if not df[mask].empty:
                    vals = df[mask].iloc[0].dropna().values
                    return str(vals[-1]).strip() if len(vals) > 1 else ""
                return "N/A"

            keys = [
                "Server Description", "Application Type", "Platform", "Server Type",
                "OS Version", "DB Version", "Enable TDE", "HA Protection",
                "Server Property", "#CPU Cores", "Memory", "App Disk", 
                "DB Data Disk", "DB Log Disk", "Total Disk Size"
            ]
            
            full_results = { re.sub(r'[^a-zA-Z0-9]', '_', k).lower().strip('_'): extract(k) for k in keys }
            
            output = {
                "ticket_context": {
                    "number": "{{ incident_result.records[0].number }}",
                    "sys_id": "{{ incident_result.records[0].sys_id }}"
                },
                "all_specs": full_results
            }
            print(json.dumps(output))
        except Exception as e:
            print(json.dumps({"error": str(e)}))
        EOF
      register: python_out

    - name: 7. Handover Data to Executioner B
      ansible.builtin.set_stats:
        data:
          provision_data: "{{ python_out.stdout | from_json }}"
          has_work: true

    # --- 递归部分：如果发现有多于1个工单，则触发下一次执行 ---
    - name: 8. RECURSIVE CHECK - Re-trigger this workflow
      ansible.builtin.uri:
        url: "https://{{ aap_host }}/api/v2/workflow_job_templates/{{ my_workflow_id }}/launch/"
        method: POST
        user: "{{ lookup('env', 'SN_USERNAME') }}"
        password: "{{ lookup('env', 'SN_PASSWORD') }}"
        force_basic_auth: yes
        status_code: 201
        body_format: json
        validate_certs: false
      when: 
        - incident_result.records is defined
        - incident_result.records | length > 1
      register: retrigger_out
      ignore_errors: yes

    - name: 9. Recursion Status Trace
      ansible.builtin.debug:
        msg: "Detected {{ incident_result.records | length - 1 }} more tickets. Automated re-trigger initiated."
      when: 
        - retrigger_out.status is defined 
        - retrigger_out.status == 201
