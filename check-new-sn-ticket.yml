---
- name: Sentinel A - Find and Download Provisioning Request
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: 1. Retrieve VM Provisioning incidents
      servicenow.itsm.incident_info:
        sysparm_query: "short_descriptionLIKEVM Provision"
      register: incident_result

    - name: 2. End play if no tickets found
      ansible.builtin.meta: end_play
      when: incident_result.records | length == 0

    - name: 3. Acknowledge the ticket
      servicenow.itsm.incident:
        state: in_progress
        number: "{{ incident_result.records[0].number }}"
        other:
          assigned_to: "{{ lookup('env', 'SN_USERNAME') }}"

    # 在 Xanadu 版本，我们用 table_info 模块精准定位附件
    - name: 4. Get Attachment Sys_ID from metadata table
      servicenow.itsm.now.table_info:
        table: sys_attachment
        query:
          table_sys_id: "{{ incident_result.records[0].sys_id }}"
      register: sn_attachment_table

    - name: 5. Download using official attachment module
      servicenow.itsm.now.attachment:
        # 确保 host 只是域名，例如：ansible.service-now.com
        instance:
          host: "{{ lookup('env', 'SN_HOST') | regex_replace('^https?://', '') }}"
          username: "{{ lookup('env', 'SN_USERNAME') }}"
          password: "{{ lookup('env', 'SN_PASSWORD') }}"
        # 传入附件本身的 sys_id
        sys_id: "{{ item.sys_id }}"
        # 落地路径
        dest: "/tmp/Provision_Request_Form_v1.xlsx"
        state: present
      loop: "{{ sn_attachment_table.records }}"
      when: 
        - sn_attachment_table.records | length > 0
        - item.file_name == "Provision_Request_Form_v1.xlsx"

    - name: 6. Verify File Download
      ansible.builtin.stat:
        path: "/tmp/Provision_Request_Form_v1.xlsx"
      register: file_stat

    - name: 7. Set stats for the next Playbook
      ansible.builtin.set_stats:
        data:
          snow_ticket_number: "{{ incident_result.records[0].number }}"
          local_excel_path: "/tmp/Provision_Request_Form_v1.xlsx"
          has_work: "{{ file_stat.stat.exists }}"
