---
- name: "Diagnostic - ServiceNow Credential Test"
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: "Test 1: Query User Table (API Connection Check)"
      # table_info 是最通用的查询模块
      servicenow.itsm.table_info:
        table: sys_user
        sysparm_query: "user_name={{ lookup('env', 'SN_USERNAME') }}"
      register: sn_auth_test

    - name: "Diagnostic Result"
      ansible.builtin.debug:
        msg: 
          - "ServiceNow Connection: SUCCESS"
          - "Connected to Instance: {{ lookup('env', 'SN_HOST') }}"
          - "Found Record for User [{{ lookup('env', 'SN_USERNAME') }}]: {{ 'YES' if sn_auth_test.records | length > 0 else 'NO' }}"
