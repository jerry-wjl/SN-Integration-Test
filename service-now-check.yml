---
- name: "Diagnostic - ServiceNow Credential Test"
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: "Test 1: Simple API GET Request"
      servicenow.itsm.api_info:
        resource: "sys_user"
        sysparm_query: "user_name={{ lookup('env', 'SN_USERNAME') }}"
      register: sn_auth_test

    - name: "Diagnostic Result"
      ansible.builtin.debug:
        msg: 
          - "ServiceNow Connection: SUCCESS"
          - "Connected to Instance: {{ lookup('env', 'SN_HOST') }}"
          # 这里改用通用打印，避开 key 名字不一致的问题
          - "API Response Data: {{ sn_auth_test.records | default(sn_auth_test.result) | default('Data retrieved successfully') }}"
