---
- name: "Diagnostic - ServiceNow Credential Test"
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: "Test 1: Get Current User Info (API Connection)"
      # 即使不传参数，这个模块也会尝试用环境中的 Credential 建立连接
      servicenow.itsm.now_info:
        table: sys_user
        sysparm_query: "user_name={{ lookup('env', 'SN_USERNAME') }}"
      register: sn_auth_test

    - name: "Diagnostic Result"
      ansible.builtin.debug:
        msg: 
          - "ServiceNow Connection: SUCCESS"
          - "Connected to Instance: {{ lookup('env', 'SN_HOST') }}"
          - "Found User Record: {{ sn_auth_test.records[0].name | default('Unknown') }}"
      when: sn_auth_test.records is defined
