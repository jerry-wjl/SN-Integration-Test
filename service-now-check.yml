---
- name: "Diagnostic - ServiceNow Credential Test"
  hosts: localhost
  gather_facts: false
  collections:
    - servicenow.itsm

  tasks:
    - name: "Test 1: Simple API GET Request (Connection Check)"
      # api_info 是这个集合里进行通用查询的最基础模块
      servicenow.itsm.api_info:
        resource: "sys_user"
        sysparm_query: "user_name={{ lookup('env', 'SN_USERNAME') }}"
      register: sn_auth_test

    - name: "Diagnostic Result"
      ansible.builtin.debug:
        msg: 
          - "ServiceNow Connection: SUCCESS"
          - "Connected to Instance: {{ lookup('env', 'SN_HOST') }}"
          - "Found User Record: {{ 'YES' if sn_auth_test.result | length > 0 else 'NO' }}"
